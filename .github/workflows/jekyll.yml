name: Build and Deploy Jekyll Site

on:
  push:
    branches:
      - main  # Убедитесь, что ваша ветка называется 'main'. Если 'master', замените здесь.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true # Это ускорит сборку, закэшировав гемы

      - name: Install Dependencies
        run: bundle install

      - name: Build with Jekyll
        # Вот ключевой момент: мы запускаем Jekyll вручную, игнорируя старые ограничения GitHub
        run: bundle exec jekyll build --destination ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4