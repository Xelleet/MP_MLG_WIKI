<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="wiki-container">
            <!-- Навигация (Header) -->
    <div class="wiki-header" style="margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px;">
        <a href="{{ '/' | relative_url }}" style="font-weight: bold; font-size: 1.1em;">🏠 Главная страница</a>
        <span style="float: right; font-size: 0.9em; color: #666;">
            {% if page.type == 'city' %}📍 Локация{% else %}👤 Персонаж{% endif %}
        </span>
        <div style="clear: both;"></div>
    </div>
        {{ content }}
    </div>
</body>
</html>
